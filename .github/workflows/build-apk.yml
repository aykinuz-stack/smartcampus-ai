name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:   # Manuel tetikleme

permissions:
  contents: write       # Release olusturmak icin

jobs:
  build:
    name: Flutter APK Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kod
        uses: actions/checkout@v4

      - name: Java 17 kur
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Flutter SDK kur
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.5'
          channel: 'stable'
          cache: true

      - name: Flutter dogrulama
        run: flutter --version

      - name: Flutter app klasorune gec
        working-directory: mobile/flutter_app
        run: |
          # Platform dosyalarini olustur (android/, ios/)
          flutter create . --platforms=android --org=com.smartcampus.ai --project-name=smartcampus_mobile

      - name: Dependencies yukle
        working-directory: mobile/flutter_app
        run: flutter pub get

      - name: App Icon olustur
        working-directory: mobile/flutter_app
        run: dart run flutter_launcher_icons || echo "Icon generation skipped"

      - name: Splash Screen olustur
        working-directory: mobile/flutter_app
        run: dart run flutter_native_splash:create || echo "Splash generation skipped"

      - name: AndroidManifest.xml — Internet + Kamera izni
        working-directory: mobile/flutter_app
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          # Permissions ekle (yoksa)
          if ! grep -q "android.permission.INTERNET" $MANIFEST; then
            sed -i '/<manifest/a \    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-permission android:name="android.permission.RECORD_AUDIO" />' $MANIFEST
          fi
          cat $MANIFEST

      - name: build.gradle — minSdkVersion 23'e yukselt
        working-directory: mobile/flutter_app
        run: |
          BUILD_GRADLE="android/app/build.gradle"
          if [ -f "$BUILD_GRADLE" ]; then
            # flutter.minSdkVersion yerine 23 koy
            sed -i 's|minSdkVersion flutter.minSdkVersion|minSdkVersion 23|g' $BUILD_GRADLE
            sed -i 's|minSdk = flutter.minSdkVersion|minSdk = 23|g' $BUILD_GRADLE
            sed -i 's|minSdk flutter.minSdkVersion|minSdk 23|g' $BUILD_GRADLE
            grep -n "minSdk" $BUILD_GRADLE || echo "minSdk satiri bulunamadi"
          fi
          # Kotlin (gradle.kts) varsa onu da guncelle
          BUILD_GRADLE_KTS="android/app/build.gradle.kts"
          if [ -f "$BUILD_GRADLE_KTS" ]; then
            sed -i 's|minSdk = flutter.minSdkVersion|minSdk = 23|g' $BUILD_GRADLE_KTS
            grep -n "minSdk" $BUILD_GRADLE_KTS || echo "minSdk (kts) bulunamadi"
          fi

      - name: Release APK build
        working-directory: mobile/flutter_app
        run: flutter build apk --release

      - name: APK boyut kontrol
        working-directory: mobile/flutter_app
        run: ls -la build/app/outputs/flutter-apk/

      - name: APK'yi artifact olarak yukle
        uses: actions/upload-artifact@v4
        with:
          name: smartcampus-app-release
          path: mobile/flutter_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: APK'yi GitHub Release'e ekle
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: SmartCampus AI v${{ github.run_number }}
          body: |
            ## SmartCampus AI Mobile v${{ github.run_number }}
            Build: ${{ github.run_number }} | Date: ${{ github.event.head_commit.timestamp }}

            **89+ Dart dosya | 118 backend route | 5 rol**

            ### Yenilikler
            - Ogrenci: Sinav Sonuclari, Kazanim Borclari, Telafi, Defterim, Sanat Sokagi, Bilisim Vadisi
            - Veli: Servis Takibi, Gunluk Bulten, Basari Duvari, Yemek Menusu, Anket
            - Rehber: Risk Degerlendirme, Gelisim Dosyasi, Yonlendirme, Kriz Mudahale, BEP
            - Yonetici: Veli Talepleri, Servis Hizmetleri, Toplanti & Kurullar
            - Ortak: Bildirim sayfasi, Dark/Light tema, Profil, Offline cache
            - Smarti AI: Chat gecmisi + sesli giris

            ### Yukleme
            1. `app-release.apk` dosyasini indir
            2. Telefonda "Bilinmeyen kaynaklara izin ver"
            3. APK'ya tikla → yukle → ac
          files: mobile/flutter_app/build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
